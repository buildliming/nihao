<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KaTeX Test</title>
<link rel="stylesheet" href="static/katex/katex.min.css">
<script src="static/katex/katex.min.js"></script>
<script src="static/katex/contrib/auto-render.min.js"></script>
</head>
<body>
<h1>Test: <code>\(\frac{1}{2}\)</code></h1>
<p>Inline: \(\frac{1}{2}\)</p>
<p>Display: $$\frac{1}{2}$$</p>
<p>Bracket: \[\frac{1}{2}\]</p>
<p>Paren: \(\frac{1}{2}\)</p>
<script>
try {
  console.log('katex available:', typeof katex);
  console.log('renderMathInElement available:', typeof renderMathInElement);
  renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false
  });
  console.log('renderMathInElement called successfully');
} catch(e) {
  console.error('Error:', e);
  document.body.innerHTML += '<p style="color:red">ERROR: ' + e.message + '</p>';
}
</script>
</body>
</html>
